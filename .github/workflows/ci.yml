# CI: 在 Linux/macOS/Windows 上跨 Deno/Bun/Node.js 运行单元测试，验证三运行时兼容性
# 浏览器测试（tests/browser.test.ts，需 Playwright + esbuild 打包）拆为本地
# `deno task test:browser`，不进 CI（避免 Chromium 下载/打包的不稳定性）。
name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

# 工作流级 env：让基于 Node 的 GitHub Actions 提前使用 Node 24 运行时。
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Deno (3 jobs)
  # ──────────────────────────────────────────────────────────────────────────
  deno-test:
    name: Deno ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.9
      - name: Check
        if: matrix.os == 'ubuntu-latest'
        run: deno check src/
      - name: Lint
        if: matrix.os == 'ubuntu-latest'
        run: deno lint src/
      - name: Test (unit)
        run: deno test -A tests/engines.test.ts tests/player.test.ts tests/integration.test.ts tests/utils.test.ts

  # ──────────────────────────────────────────────────────────────────────────
  # Bun (3 jobs)
  # ──────────────────────────────────────────────────────────────────────────
  bun-test:
    name: Bun ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3
      - name: Install dependencies
        run: bun install
      - name: Test (unit)
        run: bun test tests/engines.test.ts tests/player.test.ts tests/integration.test.ts tests/utils.test.ts

  # ──────────────────────────────────────────────────────────────────────────
  # Node.js (3 jobs)
  # ──────────────────────────────────────────────────────────────────────────
  node-test:
    name: Node ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Test (unit)
        run: npm run test:node
